name: Release

on:
  push:
    branches:
      - release
    paths:
      - '.ci/docker-matrix.json'
      - '*.Dockerfile'
      - 'linux-*.Dockerfile'
      - 'cmd/runlix-gitops/**/*.go'
      - 'internal/**/*.go'
      - 'go.mod'
      - 'go.sum'

permissions:
  contents: write
  packages: write
  pull-requests: write
  actions: read

concurrency:
  group: release-${{ github.repository }}
  cancel-in-progress: true

jobs:
  release:
    uses: runlix/build-workflow/.github/workflows/build-images-rebuild.yml@c5acba22d15a58c37df6da817cafba993ad38132 # main
    with:
      pr_mode: false
    secrets: inherit
